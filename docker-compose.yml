version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: amdox-postgres
    environment:
      POSTGRES_USER: amdox_user
      POSTGRES_PASSWORD: amdox_secure_password_2024
      POSTGRES_DB: amdox_erp
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - amdox-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U amdox_user -d amdox_erp"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: postgres -c max_connections=200 -c shared_buffers=256MB

  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: amdox-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - amdox-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes --appendfsync everysec

  # Keycloak Identity & Access Management
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.0
    container_name: amdox-keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin_password_2024
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: amdox_user
      KC_DB_PASSWORD: amdox_secure_password_2024
      KC_PROXY: "edge"
      KC_HTTP_RELATIVE_PATH: "/auth"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - amdox-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/auth/health/live"]
      interval: 15s
      timeout: 10s
      retries: 5
    entrypoint:
      - /opt/keycloak/bin/kc.sh
    command: start-dev

  # PostgreSQL Admin UI (pgAdmin)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: amdox-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@amdox.local
      PGADMIN_DEFAULT_PASSWORD: admin_password_2024
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - amdox-network
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  # Next.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: amdox-app
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://amdox_user:amdox_secure_password_2024@postgres:5432/amdox_erp
      REDIS_URL: redis://redis:6379
      NEXTAUTH_SECRET: your_nextauth_secret_here_change_in_production
      NEXTAUTH_URL: http://localhost:3000
      KEYCLOAK_URL: http://keycloak:8080/auth
      KEYCLOAK_CLIENT_ID: amdox-app
      KEYCLOAK_CLIENT_SECRET: amdox_client_secret_change_in_production
    ports:
      - "3000:3000"
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - amdox-network
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev
    stdin_open: true
    tty: true

  # Python AI Service (FastAPI + Prophet)
  ai-service:
    build:
      context: ./services/ai
      dockerfile: Dockerfile
    container_name: amdox-ai-service
    environment:
      PYTHONUNBUFFERED: 1
      DATABASE_URL: postgresql://amdox_user:amdox_secure_password_2024@postgres:5432/amdox_erp
      REDIS_URL: redis://redis:6379
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - amdox-network
    volumes:
      - ./services/ai:/app

networks:
  amdox-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  pgadmin_data:
    driver: local
